version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - rm -rf node_modules/.prisma node_modules/@prisma/client/runtime
        - npx prisma generate --no-hints
        - npx prisma db push
        - npx tsx prisma/seed.ts
    build:
      commands:
        - rm -rf .next/cache
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
